<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilal Tabibi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@200;300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="bg-image"></div>

    <main class="card-wrapper">
        <div class="card">
            <div class="card-inner">

                <div class="divider">
                    <span class="line"></span>
                    <span class="diamond">◆</span>
                    <span class="line"></span>
                </div>

                <div class="avatar-ring">
                    <img src="{{ url_for('static', filename='images/profile.jpg') }}" alt="im a horse" class="avatar" />
                </div>

                <h1 class="name">BILAL TABIBI</h1>
                <p class="title">JUNIOR DEVELOPER</p>

                <div class="divider">
                    <span class="line"></span>
                    <span class="diamond">◆</span>
                    <span class="line"></span>
                </div>

                <div class="socials">
                    <a href="#" class="social-btn" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="social-btn" aria-label="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="social-btn" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                </div>

                <div class="divider">
                    <span class="line"></span>
                    <span class="diamond">◆</span>
                    <span class="line"></span>
                </div>

                <!-- Contact Section -->
                <div class="contact-section">
                    <p class="contact-label">CONTACT ME</p>

                    <div class="contact-links">
                        <a href="mailto:devnexuscodeforge@gmail.com" class="contact-item"></a>
                            <i class="fas fa-envelope"></i>
                            <span>devnexuscodeforge@gmail.com</span>
                        </a>
                        <a href="tel:+93 793 600 462" class="contact-item">
                            <i class="fas fa-phone"></i>
                            <span>+93 793 600 462</span>
                        </a>
                        <a href="#" class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>city :kabul country : afg
                            </span>
                        </a>
                    </div>

                    <div class="contact-form">
                        <input type="text" placeholder="Your Name" class="form-input" />
                        <input type="email" placeholder="Your Email" class="form-input" />
                        <textarea placeholder="Your Message..." class="form-textarea"></textarea>
                        <button class="send-btn">
                            <i class="fas fa-paper-plane"></i>&nbsp; SEND MESSAGE
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <p>© BILAL TABIBI &nbsp;|&nbsp; JUNIOR DEVELOPER</p>
    </footer>

</body>
</html>
